<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>March Madness Upsets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  body {
    font-family: sans-serif;
    margin: 20px;
    background: #fff;
    color: #222;
  }

  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { font-size: 13px; color: #666; margin-bottom: 20px; }

  .section-label {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 6px;
  }

  #timeline-container { margin-bottom: 24px; }
  .bar { fill: steelblue; cursor: pointer; }
  .bar.dimmed { fill: #ccc; }
  .bar:hover { fill: #2a6090; }

  #filters { margin-bottom: 16px; }
  button {
    margin-right: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #aaa;
    background: #fff;
    border-radius: 3px;
  }
  button.active {
    background: steelblue;
    color: white;
    border-color: steelblue;
  }

  #heatmap-container { margin-bottom: 24px; }
  .cell rect { cursor: pointer; stroke: #fff; stroke-width: 1px; }
  .cell rect:hover { opacity: 0.75; }
  .cell text { pointer-events: none; font-size: 10px; fill: #333; }

  #tooltip {
    position: fixed;
    background: white;
    border: 1px solid #aaa;
    padding: 8px 10px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  #drilldown { font-size: 13px; }
  #drilldown h3 { margin-bottom: 8px; }
  table { border-collapse: collapse; width: 100%; max-width: 500px; }
  th, td { border: 1px solid #ddd; padding: 5px 10px; text-align: left; }
  th { background: #f0f0f0; font-size: 12px; }
  td { font-size: 12px; }
</style>
</head>
<body>

<h1>March Madness Upset Explorer</h1>
<p class="sub">2008–2025 · NCAA Tournament</p>

<div id="timeline-container">
  <div class="section-label">Upsets per year (drag to filter)</div>
  <svg id="timeline"></svg>
</div>

<div id="filters">
  <div class="section-label">Filter by round</div>
  <button class="active" data-round="all">All Rounds</button>
  <button data-round="64">Round of 64</button>
  <button data-round="32">Round of 32</button>
  <button data-round="16">Sweet 16</button>
  <button data-round="8">Elite 8</button>
  <button data-round="4">Final Four</button>
</div>

<div id="heatmap-container">
  <div class="section-label">Upset count by seed matchup (click a cell)</div>
  <svg id="heatmap"></svg>
</div>

<div id="drilldown">
  <h3 id="drilldown-title">Click a cell to see individual games</h3>
  <div id="drilldown-content"></div>
</div>

<div id="tooltip"></div>

<script>
const ROUND_NAMES = {
  '64': 'Round of 64', '32': 'Round of 32',
  '16': 'Sweet 16', '8': 'Elite 8', '4': 'Final Four', '2': 'Championship'
};

let GAMES = [];
let UPSET_COUNT = [];
let yearRange = [2008, 2025];
let activeRound = 'all';
let allYears = [];

// ── LOAD CSVs THEN INIT ───────────────────────────────────────────────────────
Promise.all([
  d3.csv("Tournament Matchups.csv"),
  d3.csv("Upset Count.csv")
]).then(([matchups, upsetCount]) => {

  UPSET_COUNT = upsetCount;

  // Parse matchups into games
  // Each game = two consecutive rows sharing the same CURRENT ROUND + YEAR
  // Group by (YEAR, CURRENT ROUND), then pair by consecutive BY YEAR NO
  const completed = matchups.filter(d => d.SCORE !== '');

  const groups = d3.group(completed, d => d.YEAR + '_' + d['CURRENT ROUND']);

  groups.forEach((rows) => {
    // Sort by BY YEAR NO descending — pairs are adjacent
    rows.sort((a, b) => +b['BY YEAR NO'] - +a['BY YEAR NO']);
    for (let i = 0; i < rows.length - 1; i += 2) {
      const t1 = rows[i], t2 = rows[i + 1];
      const s1 = +t1.SCORE, s2 = +t2.SCORE;
      if (!s1 || !s2) continue;

      const winner = s1 > s2 ? t1 : t2;
      const loser  = s1 > s2 ? t2 : t1;
      const ws = +winner.SEED, ls = +loser.SEED;
      const isUpset = ws > ls;

      GAMES.push({
        year:         +t1.YEAR,
        round:        t1['CURRENT ROUND'],
        round_name:   ROUND_NAMES[t1['CURRENT ROUND']] || t1['CURRENT ROUND'],
        winner:       winner.TEAM,
        winner_seed:  ws,
        winner_score: +winner.SCORE,
        loser:        loser.TEAM,
        loser_seed:   ls,
        loser_score:  +loser.SCORE,
        is_upset:     isUpset,
        seed_diff:    isUpset ? ws - ls : 0
      });
    }
  });

  allYears = [...new Set(GAMES.map(d => d.year))].sort();
  yearRange = [d3.min(allYears), d3.max(allYears)];

  buildTimeline();
  buildHeatmap();

}).catch(err => {
  document.body.innerHTML = `
    <h2>Could not load CSV files</h2>
    <p>Make sure <b>Tournament_Matchups.csv</b> and <b>Upset_Count.csv</b> are in the same folder as this HTML file.</p>
    <pre>${err}</pre>`;
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function filteredUpsets() {
  return GAMES.filter(d =>
    d.is_upset &&
    d.year >= yearRange[0] && d.year <= yearRange[1] &&
    (activeRound === 'all' || d.round === activeRound)
  );
}

const tip = document.getElementById('tooltip');
function showTip(html, e) {
  tip.innerHTML = html;
  tip.style.opacity = 1;
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
function hideTip() { tip.style.opacity = 0; }

// ── TIMELINE ──────────────────────────────────────────────────────────────────
function buildTimeline() {
  const W = 700, H = 80;
  const margin = { top: 10, right: 20, bottom: 24, left: 40 };
  const iW = W - margin.left - margin.right;
  const iH = H - margin.top - margin.bottom;

  const svg = d3.select('#timeline').attr('width', W).attr('height', H);
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const yearCounts = allYears.map(y => ({
    year: y,
    count: +(UPSET_COUNT.find(d => +d.YEAR === y)?.TOTAL || 0)
  }));

  const x = d3.scaleBand().domain(allYears).range([0, iW]).padding(0.2);
  const y = d3.scaleLinear().domain([0, d3.max(yearCounts, d => d.count)]).range([iH, 0]);

  g.selectAll('.bar')
    .data(yearCounts)
    .join('rect')
    .attr('class', d => `bar${d.year < yearRange[0] || d.year > yearRange[1] ? ' dimmed' : ''}`)
    .attr('x', d => x(d.year))
    .attr('y', d => y(d.count))
    .attr('width', x.bandwidth())
    .attr('height', d => iH - y(d.count))
    .on('mouseover', (e, d) => showTip(`${d.year}: ${d.count} upsets`, e))
    .on('mouseout', hideTip);

  g.append('g').attr('transform', `translate(0,${iH})`)
    .call(d3.axisBottom(x).tickFormat(d => `'${String(d).slice(2)}`))
    .call(ax => ax.select('.domain').remove())
    .call(ax => ax.selectAll('line').remove());

  const brush = d3.brushX()
    .extent([[0, 0], [iW, iH]])
    .on('end', event => {
      if (!event.selection) {
        yearRange = [d3.min(allYears), d3.max(allYears)];
      } else {
        const [x0, x1] = event.selection;
        const inRange = allYears.filter(y => x(y) + x.bandwidth() > x0 && x(y) < x1);
        yearRange = inRange.length ? [Math.min(...inRange), Math.max(...inRange)] : [d3.min(allYears), d3.max(allYears)];
      }
      buildTimeline();
      buildHeatmap();
      clearDrilldown();
    });

  g.append('g').call(brush);
}

// ── HEATMAP ───────────────────────────────────────────────────────────────────
function buildHeatmap() {
  const upsets = filteredUpsets();
  const countMap = {};
  upsets.forEach(d => {
    const k = `${d.winner_seed}-${d.loser_seed}`;
    countMap[k] = (countMap[k] || 0) + 1;
  });

  const loserSeeds  = d3.range(1, 16);
  const winnerSeeds = d3.range(2, 17);

  const cells = [];
  loserSeeds.forEach(ls => {
    winnerSeeds.forEach(ws => {
      if (ws > ls) cells.push({ ls, ws, count: countMap[`${ws}-${ls}`] || 0 });
    });
  });

  const cell = 30, pad = 2;
  const margin = { top: 30, left: 30, right: 10, bottom: 10 };
  const W = margin.left + 15 * (cell + pad) + margin.right;
  const H = margin.top + 15 * (cell + pad) + margin.bottom;

  const color = d3.scaleSequential()
    .domain([0, d3.max(cells, d => d.count) || 1])
    .interpolator(d3.interpolateBlues);

  const svg = d3.select('#heatmap').attr('width', W).attr('height', H);
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  loserSeeds.forEach((s, i) => {
    g.append('text').attr('x', i*(cell+pad)+cell/2).attr('y', -8)
      .attr('text-anchor','middle').attr('font-size','10px').attr('fill','#555').text(s);
  });
  winnerSeeds.forEach((s, i) => {
    g.append('text').attr('x', -6).attr('y', i*(cell+pad)+cell/2+4)
      .attr('text-anchor','end').attr('font-size','10px').attr('fill','#555').text(s);
  });

  const cellG = g.selectAll('.cell')
    .data(cells)
    .join('g')
    .attr('class', 'cell')
    .attr('transform', d => {
      const xi = loserSeeds.indexOf(d.ls);
      const yi = winnerSeeds.indexOf(d.ws);
      return `translate(${xi*(cell+pad)},${yi*(cell+pad)})`;
    });

  cellG.append('rect')
    .attr('width', cell).attr('height', cell).attr('rx', 2)
    .attr('fill', d => d.count === 0 ? '#f5f5f5' : color(d.count));

  cellG.filter(d => d.count > 0)
    .append('text')
    .attr('x', cell/2).attr('y', cell/2+4)
    .attr('text-anchor','middle')
    .text(d => d.count);

  cellG
    .on('mouseover', (e, d) => {
      if (!d.count) return;
      showTip(`Seed ${d.ws} upsets Seed ${d.ls}<br>${d.count} time${d.count>1?'s':''}`, e);
    })
    .on('mouseout', hideTip)
    .on('click', (e, d) => {
      if (!d.count) return;
      showDrilldown(d.ws, d.ls);
    });

  svg.append('text').attr('x', margin.left + 15*(cell+pad)/2).attr('y', 12)
    .attr('text-anchor','middle').attr('font-size','10px').attr('fill','#888')
    .text('Favored seed (lost) →');
  svg.append('text')
    .attr('transform','rotate(-90)')
    .attr('x', -(margin.top + 15*(cell+pad)/2)).attr('y', 10)
    .attr('text-anchor','middle').attr('font-size','10px').attr('fill','#888')
    .text('Upset winner seed →');
}

// ── DRILLDOWN ─────────────────────────────────────────────────────────────────
function showDrilldown(ws, ls) {
  const games = filteredUpsets()
    .filter(d => d.winner_seed === ws && d.loser_seed === ls)
    .sort((a, b) => b.year - a.year);

  document.getElementById('drilldown-title').textContent =
    `Seed ${ws} upsets Seed ${ls} — ${games.length} game${games.length !== 1 ? 's' : ''}`;

  if (!games.length) {
    document.getElementById('drilldown-content').innerHTML = '<p>No games in selected range.</p>';
    return;
  }

  const rows = games.map(g => `
    <tr>
      <td>${g.year}</td>
      <td>${g.round_name}</td>
      <td><b>${g.winner}</b> (${g.winner_seed})</td>
      <td>${g.winner_score}–${g.loser_score}</td>
      <td>${g.loser} (${g.loser_seed})</td>
    </tr>`).join('');

  document.getElementById('drilldown-content').innerHTML = `
    <table>
      <thead><tr><th>Year</th><th>Round</th><th>Winner</th><th>Score</th><th>Loser</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function clearDrilldown() {
  document.getElementById('drilldown-title').textContent = 'Click a cell to see individual games';
  document.getElementById('drilldown-content').innerHTML = '';
}

// ── ROUND FILTERS ─────────────────────────────────────────────────────────────
document.querySelectorAll('#filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRound = btn.dataset.round;
    clearDrilldown();
    buildHeatmap();
  });
});
</script>
</body>
</html>
